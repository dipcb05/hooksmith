sourceId: stripe
name: Stripe Payments
enabled: true
signature:
  strategy: stripe
  signatureHeader: stripe-signature
  secret: whsec_replace_me
outputDescription: >
  Produce a normalized billing event with provider, eventId, eventType, customerId,
  amount, currency, occurredAt, and rawObjectType.
destination:
  url: https://example.com/internal/webhooks/stripe
  method: POST
  headers:
    x-hooksmith-source: stripe
  maxAttempts: 5
  timeoutMs: 10000
connectorVersion: 1.0.0
