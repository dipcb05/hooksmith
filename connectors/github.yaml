sourceId: github
name: GitHub Repository Events
enabled: true
signature:
  strategy: github
  signatureHeader: x-hub-signature-256
  secret: github_secret_replace_me
outputDescription: >
  Produce a normalized repository activity event with provider, eventType, action,
  repository, senderLogin, branch, commitSha, title, and occurredAt when available.
destination:
  url: https://example.com/internal/webhooks/github
  method: POST
  headers:
    x-hooksmith-source: github
  maxAttempts: 5
  timeoutMs: 10000
connectorVersion: 1.0.0
