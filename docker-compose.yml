services:
  app:
    build: .
    command: npm start
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - mongo
      - redis
    volumes:
      - ./connectors:/app/connectors:ro
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  mongo-data:
